services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in infra/.env}
      POSTGRES_DB: ${POSTGRES_DB:-hel_calafkaaga}
    volumes:
      - hel_pg_data:/var/lib/postgresql/data
    ports:
      # Local-only bind for development. Production compose must not publish this.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - hel_redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Local S3-compatible object storage for Phase 3 file migration testing.
  # Not Cloudflare R2 — never point production credentials here.
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-helminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in infra/.env}
    volumes:
      - hel_minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-helminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in infra/.env}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        endpoint="$${MINIO_ENDPOINT:-http://minio:9000}"
        echo "Waiting for MinIO at $${endpoint}…"
        i=0
        until mc alias set local "$${endpoint}" "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" >/dev/null 2>&1; do
          i=$$((i + 1))
          if [ "$$i" -gt 60 ]; then
            echo "MinIO not ready after 60s" >&2
            exit 1
          fi
          sleep 1
        done
        for bucket in hel-profile hel-profile-private hel-chat hel-support hel-evc; do
          mc mb --ignore-existing "local/$${bucket}"
          mc anonymous set none "local/$${bucket}" || true
          echo "Ready: $${bucket} (private)"
        done
        echo "MinIO bucket initialization complete."
    restart: "no"

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../apps/api/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hel_calafkaaga}?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-helminio}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: "true"
      PORT: 4000
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Optional local DB UI — development only
  adminer:
    image: adminer:4
    restart: unless-stopped
    profiles: ["devtools"]
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  hel_pg_data:
  hel_redis_data:
  hel_minio_data:
